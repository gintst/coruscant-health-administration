{% extends "core/base.html" %}

{% block title %}Encrypted Document Upload{% endblock %}

{% block content %}
<div class="section">
  <h1>🔐 Upload Encrypted Document</h1>
  <p class="text-muted">Documents are encrypted before storage and are downloadable only by the uploader or an administrator.</p>
</div>

<div class="card">
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    {{ form.as_p }}
    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary">Upload Securely</button>
      <a href="{% url 'dashboard' %}" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
