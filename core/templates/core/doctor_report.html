{% extends "core/base.html" %}

{% block title %}Doctor Report - Coruscant Health Administration{% endblock %}

{% block content %}
<div class="section">
  <h1>📝 Doctor Report</h1>
  <p class="text-muted">Patient: <strong>{{ patient.user.username }}</strong></p>
</div>

<div class="card">
  <form method="post" class="mt-3">
    {% csrf_token %}
    
    <div class="section">
      <h3>Medical Report</h3>
      {{ form.as_p }}
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-secondary">Submit Report</button>
      <a href="/dashboard/" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
