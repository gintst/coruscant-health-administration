{% extends "core/base.html" %}

{% block title %}Add Health Reading - Coruscant Health Administration{% endblock %}

{% block content %}
<div class="section">
  <h1>📈 Add Health Reading</h1>
  <p class="text-muted">Record your vital signs and health measurements</p>
</div>

<div class="card">
  <form method="post" class="mt-3">
    {% csrf_token %}
    
    <div class="section">
      <h3>Health Measurements</h3>
      {{ form.as_p }}
    </div>

    <div class="text-center mt-4">
      <button type="submit" class="btn btn-primary">Save Reading</button>
      <a href="/dashboard/" class="btn btn-outline">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
