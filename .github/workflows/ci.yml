name: Django CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: testdb
          POSTGRES_USER: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres" 
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.14
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install psycopg2-binary
    - name: Configure database settings
      run: |
        cp cha/settings.py cha/settings_ci.py
        python - <<'PY'
import pathlib, re
path = pathlib.Path('cha/settings_ci.py')
text = path.read_text()
text = re.sub(r"'ENGINE': 'django.db.backends.sqlite3'", "'ENGINE': 'django.db.backends.postgresql'", text)
text = re.sub(r"'NAME': BASE_DIR / 'db.sqlite3'", "'NAME': 'testdb', 'USER': 'postgres', 'PASSWORD': 'postgres', 'HOST': '127.0.0.1', 'PORT': '5432'", text)
path.write_text(text)
PY
        export DJANGO_SETTINGS_MODULE=cha.settings_ci
    - name: Run migrations and tests
      env:
        DJANGO_SETTINGS_MODULE: cha.settings_ci
        DATABASE_URL: postgres://postgres:postgres@127.0.0.1:5432/testdb
      run: |
        python manage.py migrate --settings=cha.settings_ci
        python manage.py test --settings=cha.settings_ci
